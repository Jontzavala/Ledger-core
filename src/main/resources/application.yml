spring:
  application:
    name: ledger-core

  # --- DataSource (matches docker-compose.yml defaults) ---
  datasource:
    url: jdbc:postgresql://localhost:5432/${POSTGRES_DB:ledger}
    username: ${POSTGRES_USER:ledger_user}
    password: ${POSTGRES_PASSWORD:ledger_pass}

  # --- JPA / Hibernate ---
  jpa:
    hibernate:
      # validate: checks DB schema matches your entities at startup; fails fast on mismatch
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true

# --- Actuator ---
# expose only health and info over HTTP by default
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always